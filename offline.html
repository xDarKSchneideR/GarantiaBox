<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#6366f1">
    <title>Sin Conexión - GarantíaBox</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
        }
        
        .offline-card {
            background: white;
            color: #1e293b;
            padding: 40px 30px;
            border-radius: 16px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .offline-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 1.5rem;
            margin-bottom: 12px;
            color: #1e293b;
        }
        
        p {
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        
        .btn {
            background: #6366f1;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn:active {
            transform: scale(0.96);
        }
        
        .status {
            margin-top: 20px;
            padding: 12px;
            background: #f1f5f9;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #64748b;
        }
        
        .status.online {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
        }
    </style>
</head>
<body>
    <div class="offline-card">
        <div class="offline-icon">📡</div>
        <h1>Sin Conexión</h1>
        <p>Parece que no tienes conexión a internet. Pero no te preocupes, tus datos están guardados en este dispositivo.</p>
        
        <button class="btn" onclick="window.location.reload()">
            🔄 Reintentar
        </button>
        
        <div class="status" id="connection-status">
            Verificando conexión...
        </div>
    </div>
    
    <script>
        // Verificar estado de conexión
        function updateStatus() {
            const status = document.getElementById('connection-status');
            
            if(navigator.onLine) {
                status.textContent = '✅ ¡Conexión restaurada! Recargando...';
                status.classList.add('online');
                setTimeout(() => window.location.reload(), 1500);
            } else {
                status.textContent = '❌ Sin conexión. Tus datos siguen seguros.';
            }
        }
        
        // Escuchar cambios de conexión
        window.addEventListener('online', updateStatus);
        window.addEventListener('offline', updateStatus);
        
        // Verificar al cargar
        updateStatus();
        
        // Registrar Service Worker si está disponible
        if('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(() => console.log('SW registrado'))
                .catch(err => console.error('SW error:', err));
        }
    </script>
</body>
</html>
